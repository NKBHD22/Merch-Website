version: '3.8'

services:
  # Backend API
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: clothing-store-backend
    restart: unless-stopped
    ports:
      - "4000:4000"
    networks:
      - clothing-network

  # Frontend Next.js App
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: clothing-store-frontend
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://<YOUR_EC2_IP>:4000
    depends_on:
      - backend
    networks:
      - clothing-network

networks:
  clothing-network:
    driver: bridge
